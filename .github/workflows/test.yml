name: Hello
on:
  push:
    branches:
      - main
jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: say hello to user
        run: echo "hello dosto"
      - name: say hello to user
        run: echo "hello $USER"
  details:
    runs-on: ubuntu-latest
    steps:
    - name: show what is the version docker and python
      run: docker --version && python --version
    
