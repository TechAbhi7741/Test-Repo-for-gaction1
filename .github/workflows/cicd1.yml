name: cicd

on:
  workflow_dispatch:

jobs:
  cicd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        run: echo "code clone from github"

  build:
    runs-on: ubuntu-latest
    needs: cicd
    steps:
      - name: Build docker container
        run: echo "docker container build"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test container
        run: echo "testing container"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy container
        run: echo "container deployed"
